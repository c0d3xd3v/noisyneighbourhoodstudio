<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Audio Trigger Recorder</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<script>
// Der Flask-Server schreibt den Zustand beim Connect direkt in das JavaScript
let isRecording = {{ 'true' if running else 'false' }};

// Globale Variablen für das präzise Timing-Tracking
window.browserStartTime = null;
window.syncServerTimestamp = null;

// Sobald die Seite vollständig geladen ist, UI anpassen
window.addEventListener('DOMContentLoaded', () => {
    const statusDiv = document.getElementById("rec_status");
    const localToggle = document.getElementById("local_rec_toggle");

    if (isRecording) {
        statusDiv.innerHTML = "📡 Remote-Triggerlogik läuft im Hintergrund...";
        // Sicherheitsmaßnahme: Lokale Aufnahme deaktivieren, da alte Session weg ist
        if (localToggle) {
            localToggle.checked = false;
            localToggle.disabled = true; // Sperren, da Remote bereits läuft
        }
    } else {
        statusDiv.innerHTML = "bereit";
    }
});

async function pingPong(count = 20) {
    let results = [];

    for (let i = 0; i < count; i++) {
        let t0 = performance.now();
        await fetch("/ping");
        let t1 = performance.now();

        let rtt = t1 - t0;
        results.push(rtt);

        document.getElementById("result").innerHTML =
            `Ping ${i+1}/${count}: ${rtt.toFixed(2)} ms`;

        await new Promise(r => setTimeout(r, 300));
    }

    let avg = results.reduce((a,b) => a + b) / results.length;

    document.getElementById("result").innerHTML =
        `✅ AVG RTT: ${avg.toFixed(2)} ms`;
}

let recorder;
let chunks = [];
let stream;

let audioContext;
let scriptProcessor;
let audioBufferLeft = []; // Speichert die rohen PCM-Samples
let sampleRate = 0;

async function startRecording() {
    if (isRecording) return;

    const deviceSelect = document.querySelector('select[name="device"]');
    const selectedDevice = deviceSelect ? deviceSelect.value : "0";

    const thresholdInput = document.querySelector('input[name="threshold"]');
    const selectedThreshold = thresholdInput ? thresholdInput.value : "";

    const doLocalRec = document.getElementById("local_rec_toggle").checked;

    // 1. ZUERST: Lokales Browser-Recording initialisieren und starten
    if (doLocalRec) {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            sampleRate = audioContext.sampleRate;
            
            const source = audioContext.createMediaStreamSource(stream);
            scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);
            audioBufferLeft = [];
            
            scriptProcessor.onaudioprocess = (event) => {
                if (!isRecording) return;
                const inputBuffer = event.inputBuffer.getChannelData(0);
                audioBufferLeft.push(new Float32Array(inputBuffer));
            };
            
            source.connect(scriptProcessor);
            scriptProcessor.connect(audioContext.destination);
            
            // Lokalen Zeitstempel JETZT direkt beim echten Hardware-Start setzen
            window.browserStartTime = Date.now();
            document.getElementById("rec_status").innerHTML = "🔴 Lokale Aufnahme läuft, starte Jetson...";

        } catch (err) {
            console.error(err);
            document.getElementById("rec_status").innerHTML = "❌ Lokaler Mikrofon-Zugriff verweigert! Abbruch.";
            return; // Abbrechen, da der lokale Sync-Partner fehlt
        }
    } else {
        // Fallback, falls lokale Aufnahme explizit deaktiviert wurde
        window.browserStartTime = Date.now(); 
    }

    // 2. JETZT ERST: Präzise Latenz messen, während der Browser schon aufnimmt
    let t0 = performance.now();
    const pingResponse = await fetch("/ping");
    const pingData = await pingResponse.json();
    let t1 = performance.now();

    const networkLatency = (t1 - t0) / 2;
    // Exakte Server-Zeit berechnen, die mit unserem 'window.browserStartTime' korrespondiert
    // window.syncServerTimestamp = (pingData.server_time * 1000) + networkLatency;

    // NEU (Kompensiert die Zeit, die der Ping gedauert hat):
    const zeitSeitAufnahmeStart = Date.now() - window.browserStartTime;
    window.syncServerTimestamp = (pingData.server_time * 1000) + networkLatency - zeitSeitAufnahmeStart;

    // 3. DANACH: Den Jetson-Server verzögert triggern
    const formData = new FormData();
    formData.append("device", selectedDevice);
    formData.append("threshold", selectedThreshold);

    const response = await fetch("/recording/start", {
        method: "POST",
        body: formData
    });

    isRecording = true;

    if (response.ok) {
        const statusContainer = document.getElementById("status_container");
        if (statusContainer) {
            statusContainer.innerHTML = '<span class="dot green"></span> Aktiv';
        }
        if (doLocalRec) {
            document.getElementById("rec_status").innerHTML = "🔴 Aufnahme (WAV) + Remotelogik aktiv...";
        } else {
            document.getElementById("rec_status").innerHTML = "📡 Nur Remote-Triggerlogik aktiv";
        }
    }
}

async function stopRecording() {
    // 1. ZUERST: Den Jetson-Server stoppen und entschärfen
    const response = await fetch("/recording/stop", {
        method: "POST"
    });

    if (response.ok) {
        // Statusleuchte im Browser sofort auf Rot ("Gestoppt") umschalten
        const statusContainer = document.getElementById("status_container");
        if (statusContainer) {
            statusContainer.innerHTML = '<span class="dot red"></span> Gestoppt';
        }
    }

    isRecording = false;

    const localToggle = document.getElementById("local_rec_toggle");
    if (localToggle) localToggle.disabled = false; // Checkbox wieder freigeben

    // 2. ERST JETZT DANACH: Lokalen Browser-Recorder beenden, falls er läuft
    // Da wir oben mit dem ScriptProcessor arbeiten, prüfen wir auf 'scriptProcessor'
    if (scriptProcessor && audioContext) {
        // Verbindung trennen, um die Aufnahme hardwareseitig einzufrieren
        scriptProcessor.disconnect();
        audioContext.close();
        
        // Mikrofon-Stream komplett abschalten
        if (stream) {
            stream.getTracks().forEach(t => t.stop());
        }

        // Aus den gesammelten Float32-Arrays die WAV-Datei bauen
        const wavBlob = createWavBlob(audioBufferLeft, sampleRate);
        const url = URL.createObjectURL(wavBlob);
        
        document.getElementById("rec_status").innerHTML = "⏹ Aufnahme fertig (WAV)";
        document.getElementById("player").src = url;
        
        // Datei hochladen (Der Flask-Server benennt sie um)
        uploadRecording(wavBlob);
        
        // Variablen zurücksetzen für die nächste Aufnahme
        scriptProcessor = null;
        audioContext = null;
    } else {
        document.getElementById("rec_status").innerHTML = "⏹ Remote-Logik gestoppt";
    }
}

// Hilfsfunktion: Wandelt das rohe Float32-Array in ein 16-Bit PCM WAV-Format um
function createWavBlob(buffers, sRate) {
    // 1. Alle Buffer-Teile zu einem einzigen flachen Array verschmelzen
    let totalLength = buffers.reduce((acc, buf) => acc + buf.length, 0);
    let result = new Float32Array(totalLength);
    let offset = 0;
    for (let buf of buffers) {
        result.set(buf, offset);
        offset += buf.length;
    }

    // 2. WAV-Header erstellen (44 Bytes)
    let buffer = new ArrayBuffer(44 + result.length * 2);
    let view = new DataView(buffer);

    /* RIFF identifier */
    writeString(view, 0, 'RIFF');
    /* file length */
    view.setUint32(4, 36 + result.length * 2, true);
    /* RIFF type */
    writeString(view, 8, 'WAVE');
    /* format chunk identifier */
    writeString(view, 12, 'fmt ');
    /* format chunk length */
    view.setUint32(16, 16, true);
    /* sample format (raw PCM = 1) */
    view.setUint16(20, 1, true);
    /* channel count (Mono = 1) */
    view.setUint16(22, 1, true);
    /* sample rate */
    view.setUint32(24, sRate, true);
    /* byte rate (sample rate * block align) */
    view.setUint32(28, sRate * 2, true);
    /* block align (channel count * bytes per sample) */
    view.setUint16(32, 2, true);
    /* bits per sample (16-bit PCM) */
    view.setUint16(34, 16, true);
    /* data chunk identifier */
    writeString(view, 36, 'data');
    /* data chunk length */
    view.setUint32(40, result.length * 2, true);

    // 3. Float32 Audiodaten in Int16 (16-Bit) konvertieren und in die Datei schreiben
    let index = 44;
    for (let i = 0; i < result.length; i++) {
        let s = Math.max(-1, Math.min(1, result[i]));
        view.setInt16(index, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        index += 2;
    }

    return new Blob([view], { type: 'audio/wav' });
}

function writeString(view, offset, string) {
    for (let i = 0; i < string.length; i++) {
        view.setUint8(offset + i, string.charCodeAt(i));
    }
}

async function uploadRecording(blob) {
    const form = new FormData();
    // WICHTIG: Dateiname im JavaScript auf .wav ändern!
    form.append("file", blob, "local.wav");

    if (window.browserStartTime && window.syncServerTimestamp) {
        form.append("browser_start_time", window.browserStartTime);
        form.append("sync_server_timestamp", window.syncServerTimestamp);
    }

    await fetch("/upload_local", {
        method: "POST",
        body: form
    });
}

</script>

<div class="container">

    <h1>🎤 Audio Trigger Recorder</h1>

    <div class="card">

        <div class="status" id="status_container">
            {% if running %}
                <span class="dot green"></span> Aktiv
            {% else %}
                <span class="dot red"></span> Gestoppt
            {% endif %}
        </div>

        <label>Mikrofon</label>
        <select name="device">
            {% for d in devices %}
                <!-- NEU: d.id == current_device steuert den Reconnect-Zustand -->
                <option value="{{d.id}}" {% if d.id == current_device %}selected{% endif %}>
                    {{d.id}} - {{d.name}}
                </option>
            {% endfor %}
        </select>

        <label>Trigger (dB)</label>
        <input type="number" step="0.1" name="threshold" placeholder="{{ threshold }}">

        <div class="info">
            Samplerate: {{ samplerate }} Hz
        </div>

        <div class="checkbox-row">
            <label class="checkbox-container" for="local_rec_toggle">
                Lokale Audioaufnahme
            </label>
            <input type="checkbox" id="local_rec_toggle" checked>
        </div>

        <button class="start" type="button" onclick="startRecording()">
            ▶ Start
        </button>

        <button class="stop" type="button" onclick="stopRecording()">
            ■ Stop
        </button>

        <div id="rec_status">bereit</div>
        
        <!-- Bereich: Netzwerklatenz untereinander mit neuer touch-section Klasse -->
        <div class="touch-section">
            <button type="button" onclick="pingPong()">Netzwerklatenz messen</button>
            <h2 class="inline-title">Netzwerklatenz:</h2>
            <div id="result">Noch kein Test gestartet</div>
        </div>

        <!-- Bereich: Lokale Aufnahme untereinander mit neuer touch-section Klasse -->
        <div class="touch-section">
            <h2 class="inline-title">Lokale Aufnahme:</h2>
            <audio id="player" controls></audio>
        </div>
        
    </div>

</div>

</body>
</html>
